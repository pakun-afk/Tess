name: Oxyverse Native Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Agar lo bisa klik 'Run' manual dari HP

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Duplicate Resources
        run: |
          # Perintah penghancur error duplikat ikon
          find app/src/main/res/ -name "ic_launcher.jpg" -delete

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK Release
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oxyverse-APK-Result
          path: app/build/outputs/apk/release/*.apk
          
