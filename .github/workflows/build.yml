name: Oxyverse Native Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract ZIP Project
        run: |
          # Ganti '#BTR APPS BASE ( RAT ).zip' sesuai nama file zip yang ada di repo
          unzip *.zip 
          # Pindahkan isi folder jika unzip membuat folder baru, agar gradlew ada di luar
          mv */* . || true 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK Release
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oxyverse-APK-Result
          path: app/build/outputs/apk/release/*.apk
